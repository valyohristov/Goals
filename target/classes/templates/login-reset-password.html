<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Choose new password · Goals</title>
  <link rel="stylesheet" href="/styles.css"/>
</head>
<body>
  <main class="container app-shell" style="max-width: 420px;">
    <header class="page-header" style="flex-direction: column; align-items: stretch;">
      <div>
        <h1>Goals</h1>
        <p class="subtle" th:if="${valid}">Enter a new password</p>
        <p class="subtle" th:if="${!valid}">Link problem</p>
      </div>
    </header>
    <p class="text-danger" th:if="${error != null}" role="alert" th:text="${error}">Error</p>
    <section class="panel" th:if="${valid}">
      <form method="post" th:action="@{/login/reset-password}" class="stack">
        <input type="hidden" name="token" th:value="${token}"/>
        <label class="stack">
          <span class="subtle">New password</span>
          <input name="password" type="password" autocomplete="new-password" required minlength="6"/>
        </label>
        <label class="stack">
          <span class="subtle">Confirm</span>
          <input name="password_confirm" type="password" autocomplete="new-password" required minlength="6"/>
        </label>
        <button class="btn btn-primary" type="submit">Save password</button>
      </form>
    </section>
    <p class="subtle"><a href="/login/forgot-password">Request another link</a> · <a href="/login">Sign in</a></p>
  </main>
</body>
</html>
