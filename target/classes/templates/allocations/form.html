<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${mode == 'add'} ? 'Add allocation' : 'Edit allocation'">Allocation</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="container mt-4">
    <h1 class="mb-4" th:text="${mode == 'add'} ? 'Add allocation' : 'Edit allocation'">Allocation</h1>
    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>
    <form th:action="${mode == 'add'} ? @{/allocations/add} : @{/allocations/edit/{id}(id=${allocation.id})}"
          th:object="${allocation}" method="post">
        <div class="row mb-3">
            <div class="col-md-4">
                <label class="form-label">Person</label>
                <select class="form-select" th:field="*{employee}" required>
                    <option th:each="e : ${employees}" th:value="${e.id}" th:text="${e.name}"></option>
                </select>
            </div>
            <div class="col-md-4">
                <label class="form-label">Project</label>
                <select class="form-select" th:field="*{project}" required>
                    <option th:each="p : ${projects}" th:value="${p.id}" th:text="${p.name}"></option>
                </select>
            </div>
            <div class="col-md-2">
                <label class="form-label">FTE</label>
                <input class="form-control" type="number" th:field="*{fte}" step="0.001" min="0.001" max="999" required>
            </div>
            <div class="col-md-2">
                <label class="form-label">Week (Monday)</label>
                <input class="form-control" type="date" th:field="*{weekStartDate}" required>
            </div>
        </div>
        <div class="d-flex justify-content-end mt-4">
            <button type="submit" class="btn btn-success me-2">💾 Save</button>
            <a th:href="@{/allocations(week=${allocation.weekStartDate})}" class="btn btn-primary">↩️ Cancel</a>
        </div>
    </form>
</div>
</body>
</html>
