<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign in · Goals</title>
  <link rel="stylesheet" href="/styles.css"/>
</head>
<body>
  <main class="container app-shell" style="max-width: 420px;">
    <header class="page-header" style="flex-direction: column; align-items: stretch;">
      <div>
        <h1>Goals</h1>
        <p class="subtle">Sign in to continue</p>
      </div>
    </header>
    <p class="text-danger" th:if="${loginError}" role="alert">Invalid username or password.</p>
    <p class="subtle" th:if="${info != null}" role="status" th:text="${info}">Info</p>
    <section class="panel">
      <form method="post" th:action="@{/login}" class="stack">
        <input type="hidden" name="next" th:if="${nextPath != null and !#strings.isEmpty(nextPath)}" th:value="${nextPath}"/>
        <label class="stack">
          <span class="subtle">Username</span>
          <input name="username" type="text" autocomplete="username" required/>
        </label>
        <label class="stack">
          <span class="subtle">Password</span>
          <input name="password" type="password" autocomplete="current-password" required/>
        </label>
        <button class="btn btn-primary" type="submit">Sign in</button>
        <p class="subtle"><a href="/login/forgot-password">Forgot your password?</a></p>
      </form>
    </section>
  </main>
</body>
</html>
