<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Load dashboard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="container-fluid mt-4 px-5">
    <h1 class="mb-2 text-center">Load distribution</h1>
    <p class="text-center text-muted mb-4">FTE by week (Monday start)</p>

    <div th:replace="~{fragments/nav :: nav ('dashboard')}"></div>

    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

    <form class="row g-2 align-items-end mb-4" method="get" th:action="@{/dashboard}">
        <div class="col-auto" th:if="${!#lists.isEmpty(data.weekChoices())}">
            <label class="form-label">Week (Monday)</label>
            <select class="form-select" name="week" onchange="this.form.submit()">
                <option th:each="w : ${data.weekChoices()}"
                        th:value="${w}"
                        th:selected="${w == data.week()}"
                        th:text="${w}"></option>
            </select>
        </div>
        <div class="col-12 col-md-auto d-flex flex-wrap align-items-end gap-2" th:if="${#lists.isEmpty(data.weekChoices())}">
            <div>
                <label class="form-label d-block">Week (Monday)</label>
                <input class="form-control" type="date" name="week" th:value="${data.week()}">
            </div>
            <button type="submit" class="btn btn-primary">Go</button>
            <p class="text-muted small mb-0 align-self-center">No saved weeks yet — pick a Monday to preview the matrix.</p>
        </div>
    </form>

    <div class="card shadow-sm mb-4" th:if="${!#lists.isEmpty(data.projects())}">
        <div class="card-body p-4 overflow-auto">
            <table class="table table-bordered table-matrix mb-0">
                <thead class="table-light">
                <tr>
                    <th>Person / capacity</th>
                    <th th:each="p : ${data.projects()}" class="num">
                        <span th:text="${p.name()}">Project</span>
                        <span class="d-block small text-muted"
                              th:text="${#numbers.formatDecimal(p.allocatedSum(), 1, 3)} + ' / ' + ${#numbers.formatDecimal(p.capacityFte(), 1, 3)} + ' FTE'"></span>
                    </th>
                    <th class="num">Σ allocated</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="row : ${data.rows()}"
                    th:classappend="${row.allocatedSum().compareTo(row.capacityFte()) > 0} ? 'row-over'">
                    <td>
                        <span th:text="${row.name()}">Name</span>
                        <span class="d-block small text-muted"
                              th:text="${#numbers.formatDecimal(row.capacityFte(), 1, 3)} + ' FTE cap'"></span>
                    </td>
                    <td th:each="v : ${row.ftesByProjectOrder()}" class="num">
                        <span th:if="${v.compareTo(T(java.math.BigDecimal).ZERO) == 0}">—</span>
                        <span th:unless="${v.compareTo(T(java.math.BigDecimal).ZERO) == 0}"
                            th:text="${#numbers.formatDecimal(v, 1, 3)}"></span>
                    </td>
                    <td class="num fw-semibold"
                        th:text="${#numbers.formatDecimal(row.allocatedSum(), 1, 3)}"></td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="card shadow-sm" th:if="${!#lists.isEmpty(data.weekChoices())}">
        <div class="card-body p-4">
            <h5 class="mb-3">Copy week to another Monday</h5>
            <form class="row g-2" th:action="@{/dashboard/copy-week}" method="post">
                <div class="col-md-3">
                    <label class="form-label">From</label>
                    <select class="form-select" name="fromWeek" required>
                        <option th:each="w : ${data.weekChoices()}" th:value="${w}" th:text="${w}"></option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label">To (Monday)</label>
                    <input class="form-control" type="date" name="toWeek" required>
                </div>
                <div class="col-md-3 d-flex align-items-end">
                    <button type="submit" class="btn btn-secondary">Copy allocations</button>
                </div>
            </form>
            <p class="small text-muted mt-2 mb-0">Rows that would exceed capacity in the target week are skipped.</p>
        </div>
    </div>
</div>
</body>
</html>
