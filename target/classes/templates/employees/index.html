<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>People</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="container-fluid mt-4 px-5">
    <h1 class="mb-4 text-center">People</h1>
    <div th:replace="~{fragments/nav :: nav ('employees')}"></div>
    <div class="d-flex justify-content-end mb-3">
        <a th:href="@{/employees/add}" class="btn btn-success">✚ Add person</a>
    </div>
    <div class="card shadow-sm">
        <div class="card-body p-4">
            <table class="table table-striped table-bordered mb-0">
                <thead class="table-light">
                <tr>
                    <th style="width: 80px;">ID</th>
                    <th>Name</th>
                    <th class="text-end">Capacity (FTE)</th>
                    <th class="text-end pe-4" style="width: 220px;">Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="e : ${employees}">
                    <td th:text="${e.id}"></td>
                    <td th:text="${e.name}"></td>
                    <td class="text-end" th:text="${#numbers.formatDecimal(e.capacityFte, 1, 3)}"></td>
                    <td class="actions d-flex justify-content-end gap-2 pe-4">
                        <a th:href="@{/employees/edit/{id}(id=${e.id})}" class="btn btn-warning btn-sm">✏️ Edit</a>
                        <a th:href="@{/employees/delete/{id}(id=${e.id})}" class="btn btn-danger btn-sm"
                           onclick="return confirm('Delete this person and their allocations?')">🗑️ Delete</a>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(employees)}">
                    <td colspan="4" class="text-center text-muted">No people yet.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
