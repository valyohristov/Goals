<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Allocations</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="container-fluid mt-4 px-5">
    <h1 class="mb-4 text-center">Allocations</h1>
    <div th:replace="~{fragments/nav :: nav ('allocations')}"></div>

    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

    <form class="row g-2 align-items-end mb-3" method="get" th:action="@{/allocations}">
        <div class="col-auto">
            <label class="form-label">Week (Monday)</label>
            <select class="form-select" name="week" onchange="this.form.submit()" th:if="${!#lists.isEmpty(weekChoices)}">
                <option th:each="w : ${weekChoices}"
                        th:value="${w}"
                        th:selected="${w == weekParam}"
                        th:text="${w}"></option>
            </select>
            <input th:if="${#lists.isEmpty(weekChoices)}" class="form-control" type="date" name="week" th:value="${weekParam}">
        </div>
        <div class="col-auto" th:if="${#lists.isEmpty(weekChoices)}">
            <button type="submit" class="btn btn-primary">Go</button>
        </div>
        <div class="col-auto ms-auto">
            <a th:href="@{/allocations/add(week=${weekParam})}" class="btn btn-success">✚ Add allocation</a>
        </div>
    </form>

    <div class="card shadow-sm">
        <div class="card-body p-4">
            <table class="table table-striped table-bordered mb-0">
                <thead class="table-light">
                <tr>
                    <th style="width: 80px;">ID</th>
                    <th>Person</th>
                    <th>Project</th>
                    <th class="text-end">FTE</th>
                    <th>Week</th>
                    <th class="text-end pe-4" style="width: 220px;">Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="a : ${allocations}">
                    <td th:text="${a.id}"></td>
                    <td th:text="${a.employee.name}"></td>
                    <td th:text="${a.project.name}"></td>
                    <td class="text-end" th:text="${#numbers.formatDecimal(a.fte, 1, 3)}"></td>
                    <td th:text="${a.weekStartDate}"></td>
                    <td class="actions d-flex justify-content-end gap-2 pe-4">
                        <a th:href="@{/allocations/edit/{id}(id=${a.id})}" class="btn btn-warning btn-sm">✏️ Edit</a>
                        <a th:href="@{/allocations/delete/{id}(id=${a.id})}" class="btn btn-danger btn-sm"
                           onclick="return confirm('Delete this allocation?')">🗑️ Delete</a>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(allocations)}">
                    <td colspan="6" class="text-center text-muted">No allocations for this week.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
