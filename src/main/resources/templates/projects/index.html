<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Projects</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="container-fluid mt-4 px-5">
    <h1 class="mb-4 text-center">Projects</h1>
    <div th:replace="~{fragments/nav :: nav ('projects')}"></div>
    <div class="d-flex justify-content-end mb-3">
        <a th:href="@{/projects/add}" class="btn btn-success">✚ Add project</a>
    </div>
    <div class="card shadow-sm">
        <div class="card-body p-4">
            <table class="table table-striped table-bordered mb-0">
                <thead class="table-light">
                <tr>
                    <th style="width: 80px;">ID</th>
                    <th>Name</th>
                    <th style="width: 100px;">Color</th>
                    <th class="text-end">Capacity (FTE)</th>
                    <th class="text-end pe-4" style="width: 220px;">Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="p : ${projects}">
                    <td th:text="${p.id}"></td>
                    <td th:text="${p.name}"></td>
                    <td>
                        <span th:if="${p.color != null}"
                              class="d-inline-block rounded border"
                              th:style="|width:28px;height:20px;background-color:${p.color}|"></span>
                        <span th:if="${p.color == null}" class="text-muted">—</span>
                    </td>
                    <td class="text-end" th:text="${#numbers.formatDecimal(p.capacityFte, 1, 3)}"></td>
                    <td class="actions d-flex justify-content-end gap-2 pe-4">
                        <a th:href="@{/projects/edit/{id}(id=${p.id})}" class="btn btn-warning btn-sm">✏️ Edit</a>
                        <a th:href="@{/projects/delete/{id}(id=${p.id})}" class="btn btn-danger btn-sm"
                           onclick="return confirm('Delete this project and related allocations?')">🗑️ Delete</a>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(projects)}">
                    <td colspan="5" class="text-center text-muted">No projects yet.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
