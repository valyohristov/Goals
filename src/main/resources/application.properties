spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.datasource.url=jdbc:mysql://localhost:3306/Goals?allowPublicKeyRetrieval=true&nullCatalogMeansCurrent=true
# nullCatalogMeansCurrent: JDBC metadata with null catalog targets the current DB on MySQL.
spring.datasource.username=root
spring.datasource.password=SuperSecret#1
#spring.datasource.url=jdbc:mysql://localhost:3306/demo_load_dist
#spring.datasource.username=root
#spring.datasource.password=
# Hibernate 6.2 schema validation uses INFORMATION_SCHEMA queries that require MySQL 8+ (e.g. RESERVED column).
# On MySQL 5.7 metadata extraction fails (see HHH000339), then validate wrongly reports missing tables. Flyway owns DDL.
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.default_batch_fetch_size=32
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
# Baseline skips migrations <= this version. Default 1 skips V1 on a non-empty DB with no history — use 0 so V1–V5 apply.
spring.flyway.baseline-version=0

spring.sql.init.mode=never

spring.mvc.date-format=yyyy-MM-dd

spring.thymeleaf.cache=false
server.port=8092

app.base-url=
app.session-secret=goals-app-dev-secret-change-me
app.admin-username=admin
app.admin-password=MegaSecret#1
